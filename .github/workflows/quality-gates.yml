name: Quality Gates

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npm run build

      # BUG-C2: Run Vitest unit tests
      - name: Unit tests (Vitest)
        run: npm run test:unit

      # BUG-C2: Enforce coverage threshold
      - name: Coverage report
        run: npm run test:coverage
        continue-on-error: false   # Fail CI if thresholds not met

      # BUG-C3: npm audit for frontend dependency security
      - name: Frontend npm audit
        run: npm audit --audit-level=moderate --production
        continue-on-error: false

  backend-node-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend-node/package-lock.json
      - run: npm ci

      # BUG-C2: Run Jest unit tests (no MongoDB needed — auth.js mocked)
      - name: Unit tests (Jest)
        run: npm run test:unit

      # BUG-C3: npm audit for backend-node dependency security
      - name: Backend-Node npm audit
        run: npm audit --audit-level=moderate --production
        continue-on-error: false

  backend-python-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend-python/requirements.txt

      # BUG-C4: Install ruff for linting + formatting check
      - name: Install ruff
        run: pip install ruff

      # BUG-C4: Python linting (errors and style violations)
      - name: Ruff lint
        run: ruff check backend-python/
        continue-on-error: false

      # BUG-C4: Python formatting check (non-destructive, just checks)
      - name: Ruff format check
        run: ruff format --check backend-python/
        continue-on-error: false

      - name: Compile critical Python modules
        run: |
          python - <<'PY'
          import py_compile
          from pathlib import Path

          files = [Path('backend-python/server.py')]
          files += sorted(Path('backend-python/app').glob('*.py'))
          files += sorted(Path('backend-python/app/routes').glob('*.py'))

          for file in files:
              py_compile.compile(str(file), doraise=True)
          print(f'Compiled {len(files)} Python files successfully.')
          PY

      # BUG-C2: Install test deps and run pytest unit tests
      - name: Install test dependencies
        run: pip install pytest httpx pytest-asyncio pyjwt
        working-directory: backend-python

      - name: Unit tests (pytest)
        run: pytest tests/ -v --tb=short
        working-directory: backend-python

      # BUG-C3: pip-audit for Python dependency security scanning
      - name: pip-audit (Python dependency security)
        run: |
          pip install pip-audit
          pip-audit -r backend-python/requirements.txt --progress-spinner off
        continue-on-error: false

  # BUG-C3: Secret scanning across the whole repo
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for commit-range scanning
      - name: Detect secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
