# nutrition_rules.yaml
# Centralized rules engine for the Elevate Nutrition Engine

variety:
  breakfast_max_frequency_days: 3
  lunch_max_frequency_days: 4
  dinner_max_frequency_days: 4
  snack_max_frequency_days: 3
  protein_source_consecutive_max: 3
  cuisine_daily_max: 3
  cooking_style_consecutive_max: 3

portions:
  chutney_pickle_max_tbsp: 2.0
  salad_raita_max_bowl: 1.0
  salad_raita_min_bowl: 0.5
  whey_max_scoop: 1.0
  drink_max_glass: 1.0
  condiment_max_calories_percent: 15.0
  side_dish_max_calories_percent: 40.0
  side_dish_multiplier_max: 1.0

food_calorie_caps:
  salad: 150
  raita: 100
  kachumber: 120
  kosambari: 120
  tossed: 150
  chutney: 50
  pickle: 30
  achar: 30
  tea: 80
  coffee: 100

retry_limits:
  candidate: 20
  meal: 10
  day: 5
  week: 2

validation_thresholds:
  macro_tolerance_percent: 12
  daily_retry_limit: 5
  weekly_retry_limit: 3
  max_duplicate_meals: 1
  max_same_protein_per_week: 3
  max_same_cuisine_per_day: 2
  max_same_cooking_style_per_day: 2

compatibility_matrix:
  protein_main:
    carb_base: 1.2
    veg_side: 1.1
    salad: 0.9
    dairy_side: 0.9
  curry:
    carb_base: 1.3 # Excellent combination (e.g. Sabji + Roti)
    veg_side: 0.8
    salad: 0.9
    dairy_side: 0.9
  carb_base:
    protein_main: 1.2
    curry: 1.3
    veg_side: 1.1
    dairy_side: 0.9
  dairy_side:
    salad: 0.4
    dairy_side: 0.0 # Prevents duplicate raitas
    protein_main: 0.9
    carb_base: 0.9
    veg_side: 0.8
  salad:
    salad: 0.0 # Prevents duplicate salads
    dairy_side: 0.4
    protein_main: 0.9
    curry: 0.9
    carb_base: 0.8

# ── Cuisine Compatibility ─────────────────────────────────────────────────
# Defines which cuisine groups can coexist in the same meal.
# A meal is compatible if ALL cuisines present belong to the same group.
# Incompatible mixes (e.g. Italian + Pan Indian) receive a soft penalty.
cuisine_compatibility:
  Pan Indian:
    - Pan Indian
    - South Indian
    - North Indian
    - East Indian
    - West Indian
    - North East Indian
    - All India
  South Indian:
    - South Indian
    - Pan Indian
    - All India
  Italian:
    - Italian
    - Continental
  Chinese:
    - Chinese
  Mexican:
    - Mexican
  Continental:
    - Continental
    - Italian
  Lebanese:
    - Lebanese
    - Continental

# ── Protein Distribution Targets ─────────────────────────────────────────
# target: fraction of daily_protein this meal should deliver
# tolerance: acceptable deviation before soft penalty kicks in
# Below (target - tolerance) = hard minimum check (reject candidate)
protein_distribution:
  breakfast:
    target: 0.22
    tolerance: 0.05  # acceptable: 17% – 27% of daily protein
  lunch:
    target: 0.30
    tolerance: 0.05  # acceptable: 25% – 35% of daily protein
  dinner:
    target: 0.30
    tolerance: 0.05  # acceptable: 25% – 35% of daily protein
  snack:
    target: 0.15
    tolerance: 0.05  # acceptable: 10% – 20% of daily protein

# ── Calorie Distribution Bounds ──────────────────────────────────────────
# Hard limits: candidates violating these are rejected before optimization.
calorie_distribution:
  breakfast:
    min: 0.15
    max: 0.35
  lunch:
    min: 0.25
    max: 0.40
  dinner:
    min: 0.20
    max: 0.38
  snack:
    min: 0.08
    max: 0.20

# ── Performance Limits ───────────────────────────────────────────────────
performance:
  max_candidates_per_meal: 15
  max_templates_evaluated: 5
  max_optimization_per_meal: 1

# ── Candidate Generation Tuning ───────────────────────────────────────────
# Tune these values based on Phase 0 diagnostic output.
# diversity_filter.top_n_percent: fraction of passing candidates kept before
# random sampling.  Start at 0.50; raise toward 0.80 only if acceptance rate
# remains below 10% after Phase 1 template-driven generation is in place.
candidate_generation:
  diversity_filter:
    top_n_percent: 0.50   # baseline — tune up in 0.10 increments based on metrics
  acceptance_rate_warning_threshold: 0.05  # log WARNING if acceptance_rate < this

# ── Daily Validator Tolerances ────────────────────────────────────────────
# Allowed calorie / protein deviation per attempt before "Failed Day" fires.
# Keeping these in config avoids burying magic numbers in weekly_optimizer.py.
daily_validator:
  calories:
    first_attempt: 0.12   # 12% deviation allowed on attempt 1 (was 5%)
    second_attempt: 0.15  # 15% on attempt 2
    final: 0.20           # 20% on all subsequent attempts
  protein:
    first_attempt: 0.12
    second_attempt: 0.15
    final: 0.20
