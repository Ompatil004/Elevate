# nutrition_rules.yaml
# Centralized rules engine for the Elevate Nutrition Engine
# Single source of truth — all engine behaviour is driven from here.
# Python code must NEVER hardcode values that belong in this file.

# ── Variety Rules ─────────────────────────────────────────────────────────────
variety:
  breakfast_max_frequency_days: 3
  lunch_max_frequency_days: 4
  dinner_max_frequency_days: 4
  snack_max_frequency_days: 3
  protein_source_consecutive_max: 3
  cuisine_daily_max: 2        # max distinct cuisines per day  (was 3; now consistent with validation_thresholds)
  cooking_style_consecutive_max: 3

# ── Portions — condiment / side / drink hard caps ─────────────────────────────
portions:
  chutney_pickle_max_tbsp: 2.0
  salad_raita_max_bowl: 1.0
  salad_raita_min_bowl: 0.5
  whey_max_scoop: 1.0
  drink_max_glass: 1.0
  condiment_max_calories_percent: 15.0
  side_dish_max_calories_percent: 40.0
  side_dish_multiplier_max: 1.0

# ── Per-Category Serving Limits (Part 4) ──────────────────────────────────────
# Consumed by PortionOptimizer and FoodGraph for realistic household servings.
# All values are in the stated unit.
serving_limits:
  chapati:    {unit: piece, min: 1,   max: 4,   step: 1,   pref: 2}
  roti:       {unit: piece, min: 1,   max: 4,   step: 1,   pref: 2}
  bhakri:     {unit: piece, min: 1,   max: 3,   step: 1,   pref: 2}
  paratha:    {unit: piece, min: 1,   max: 3,   step: 1,   pref: 1}
  thepla:     {unit: piece, min: 1,   max: 4,   step: 1,   pref: 2}
  naan:       {unit: piece, min: 1,   max: 3,   step: 1,   pref: 1}
  bread:      {unit: slice, min: 1,   max: 4,   step: 1,   pref: 2}
  rice:       {unit: bowl,  min: 0.5, max: 2.0, step: 0.5, pref: 1.0}
  khichdi:    {unit: bowl,  min: 1.0, max: 2.0, step: 0.5, pref: 1.0}
  biryani:    {unit: plate, min: 0.5, max: 1.5, step: 0.5, pref: 1.0}
  pulao:      {unit: plate, min: 0.5, max: 1.5, step: 0.5, pref: 1.0}
  dal:        {unit: bowl,  min: 1.0, max: 2.0, step: 0.5, pref: 1.0}
  sambar:     {unit: bowl,  min: 1.0, max: 2.0, step: 0.5, pref: 1.0}
  kadhi:      {unit: bowl,  min: 1.0, max: 2.0, step: 0.5, pref: 1.0}
  rasam:      {unit: bowl,  min: 1.0, max: 2.0, step: 0.5, pref: 1.0}
  curry:      {unit: bowl,  min: 1.0, max: 2.0, step: 0.5, pref: 1.0}
  sabzi:      {unit: bowl,  min: 1.0, max: 2.0, step: 0.5, pref: 1.0}
  yogurt:     {unit: bowl,  min: 0.5, max: 2.0, step: 0.5, pref: 1.0}
  curd:       {unit: bowl,  min: 0.5, max: 2.0, step: 0.5, pref: 1.0}
  raita:      {unit: bowl,  min: 0.5, max: 1.0, step: 0.5, pref: 0.5}
  salad:      {unit: bowl,  min: 0.5, max: 1.0, step: 0.5, pref: 1.0}
  soup:       {unit: bowl,  min: 1.0, max: 2.0, step: 0.5, pref: 1.0}
  egg:        {unit: piece, min: 1,   max: 4,   step: 1,   pref: 2}
  idli:       {unit: piece, min: 2,   max: 6,   step: 1,   pref: 4}
  dosa:       {unit: piece, min: 1,   max: 2,   step: 1,   pref: 1}
  chutney:    {unit: tbsp,  min: 0.5, max: 2.0, step: 0.5, pref: 1.0}
  pickle:     {unit: tbsp,  min: 0.5, max: 2.0, step: 0.5, pref: 1.0}
  milk:       {unit: glass, min: 1.0, max: 2.0, step: 0.5, pref: 1.0}
  smoothie:   {unit: glass, min: 1.0, max: 1.0, step: 0.5, pref: 1.0}
  shake:      {unit: glass, min: 1.0, max: 1.0, step: 0.5, pref: 1.0}
  whey:       {unit: scoop, min: 1.0, max: 1.0, step: 0.5, pref: 1.0}
  tea:        {unit: cup,   min: 1.0, max: 1.0, step: 0.5, pref: 1.0}
  coffee:     {unit: cup,   min: 1.0, max: 1.0, step: 0.5, pref: 1.0}

# ── Food Calorie Caps — max calories for any single side/condiment ─────────────
food_calorie_caps:
  salad: 150
  raita: 100
  kachumber: 120
  kosambari: 120
  tossed: 150
  chutney: 50
  pickle: 30
  achar: 30
  tea: 80
  coffee: 100

# ── Retry Limits (single authoritative source) ────────────────────────────────
retry_limits:
  candidate: 20
  meal: 10
  day: 3
  week: 2

# ── Validation Thresholds ─────────────────────────────────────────────────────
validation_thresholds:
  macro_tolerance_percent: 12
  daily_retry_limit: 3          # must match retry_limits.day
  weekly_retry_limit: 2         # must match retry_limits.week
  max_duplicate_meals: 1
  max_same_protein_per_week: 3
  max_same_cuisine_per_day: 2   # must match variety.cuisine_daily_max
  max_same_cooking_style_per_day: 2

# ── Nutrition Validation (Part 5) ─────────────────────────────────────────────
# Rules for rejecting structurally invalid foods from entering the engine.
# Applied at FoodGraph load time.
nutrition_validation:
  reject_if:
    calories_lte: 0      # reject any food where calories <= 0 (unless zero_cal_allowed)
    protein_lt: 0        # reject if protein < 0
    carbs_lt: 0          # reject if carbs < 0
    fat_lt: 0            # reject if fat < 0
  zero_cal_allowed:
    - water
    - black coffee
    - plain tea
    - green tea
    - herbal tea

# ── Data Validation ───────────────────────────────────────────────────────────
data_validation:
  required_csv_columns:
    - food_id
    - food_name
    - category
    - meal_type
    - diet_type
    - serving_size_g
    - calories_kcal
    - protein_g
    - carbohydrates_g
    - fat_g
    - region
  required_node_fields:
    - food_id
    - food_name
    - nutrition
  required_nutrition_fields:
    - calories
    - protein
    - carbs
    - fat

# ── Calorie Validation ────────────────────────────────────────────────────────
calorie_validation:
  enabled: true
  tolerance_pct: 25
  correction_policy: log_only   # options: log_only | auto_correct

# ── Compatibility Matrix ──────────────────────────────────────────────────────
compatibility_matrix:
