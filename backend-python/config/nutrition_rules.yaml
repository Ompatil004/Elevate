# ── Protein Distribution Targets ──────────────────────────────────────────────
protein_distribution:
  breakfast:
    target: 0.22
    tolerance: 0.05
  lunch:
    target: 0.30
    tolerance: 0.05
  dinner:
    target: 0.30
    tolerance: 0.05
  snack:
    target: 0.15
    tolerance: 0.05

# ── Calorie Distribution Bounds ───────────────────────────────────────────────
calorie_distribution:
  breakfast:
    min: 0.15
    max: 0.35
  lunch:
    min: 0.25
    max: 0.40
  dinner:
    min: 0.20
    max: 0.38
  snack:
    min: 0.08
    max: 0.20

# ── Performance Limits ────────────────────────────────────────────────────────
performance:
  max_candidates_per_meal: 10
  max_templates_evaluated: 3
  max_optimization_per_meal: 1
  oversample_factor: 2

# ── Candidate Generation Tuning ───────────────────────────────────────────────
candidate_generation:
  diversity_filter:
    top_n_percent: 0.50
  acceptance_rate_warning_threshold: 0.05

# ── Candidate Selection (top_k must not exceed max_candidates_per_meal) ────────
candidate_selection:
  top_k: 10        # was 15 — fixed to match max_candidates_per_meal
  temperature: 1.0

# ── Daily Validator Tolerances ────────────────────────────────────────────────
daily_validator:
  calories:
    first_attempt: 0.03
    second_attempt: 0.05
    final: 0.08
  protein:
    first_attempt: 0.03
    second_attempt: 0.05
    final: 0.08

# ── Meal Blueprint Configuration (Part 3) ─────────────────────────────────────
# Configuration-driven meal composition rules consumed by CandidateGenerator
# and Validators.  Never hardcode meal sizes in Python.
#
# slot_roles maps each slot label to the candidate's expected food_group or meal_role.
# optional_choose_one: only ONE of these optional slots is filled per meal.
meal_blueprints:
  breakfast:
    required:
      - main_breakfast       # carb_base or breakfast food
      - protein_or_dairy     # egg, paneer, curd, yogurt, whey
    optional_choose_one:
      - fruit
      - healthy_drink
    max_foods: 3
    slot_roles:
      main_breakfast:    [carb_base, breakfast]
      protein_or_dairy:  [protein_main, dairy_side]
      fruit:             [fruit, salad]
      healthy_drink:     [dairy_side, beverage]

  lunch:
    required:
      - carb
      - protein
      - vegetable
    optional_choose_one:
      - salad
      - soup
      - raita
      - chutney
    max_foods: 4
    slot_roles:
      carb:       [carb_base]
      protein:    [protein_main, curry]
      vegetable:  [veg_side]
      salad:      [salad]
      soup:       [soup]
      raita:      [dairy_side]
      chutney:    [condiment]

  dinner:
    required:
      - carb
      - protein
      - vegetable
    optional_choose_one:
      - salad
      - soup
      - raita
    max_foods: 4
    slot_roles:
      carb:       [carb_base]
      protein:    [protein_main, curry]
      vegetable:  [veg_side]
      salad:      [salad]
      soup:       [soup]
      raita:      [dairy_side]

  snack:
    required:
      - snack_item
    optional_choose_one:
      - drink
    max_foods: 2
    slot_roles:
      snack_item: [protein_main, dairy_side, salad, fruit]
      drink:      [dairy_side, beverage]

# ── Meal Rules ─────────────────────────────────────────────────────────────────
# Structural rules for plate validation (read by weekly_validator / candidate_generator)
meal_rules:
  never_two_starches: true        # no two carb_base items in same plate
  never_two_dairy_sides: true     # no two raita/yogurt items in same plate
  never_two_salads: true          # no two salad items in same plate
  max_proteins_per_plate: 2       # max protein_main + curry roles per plate
  breakfast_max_heavy_carbs: 1    # max rice/roti at breakfast

# ── Breakfast Rotation Categories & Patterns ──────────────────────────────────
breakfast_rotation:
  categories:
    - South Indian
    - North Indian
    - Maharashtrian
    - Egg Based
    - Oats & Cereals
    - Millets
    - Smoothies
    - Fruit
    - Traditional
  patterns:
    South Indian:   [dosa, idli, uttapam, upma, pongal, paniyaram, appam, south indian]
    North Indian:   [paratha, puri, bhature, thepla, north indian]
    Maharashtrian:  [poha, sabudana, thalipeeth, misal, maharashtrian]
    Egg Based:      [egg, omelette, bhurji, scrambled]
    Oats & Cereals: [oats, cereal, muesli, cornflakes, porridge]
    Millets:        [millet, ragi, jowar, bajra]
    Smoothies:      [smoothie, shake, milkshake]
    Fruit:          [fruit, apple, banana, papaya]
    Traditional:    [cheela, chilla, khichdi, traditional]

# ── Variety Penalties & Limits ────────────────────────────────────────────────
variety_penalties:
  same_food_consecutive_days: 15
  same_food_second_occurrence: 25
  same_food_third_occurrence:  50
  same_dish_family_per_week:   8
  same_breakfast_category_consecutive: 20
  same_cuisine_per_week:       5

variety_limits:
