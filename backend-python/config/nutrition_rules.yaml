# ── Regional Preferences (Part 7) ─────────────────────────────────────────────
# default_region is used when the user profile has no explicit region set.
# Scoring weights are soft — foods from other regions are never rejected.
regional_preferences:
  default_region: Maharashtra
  cuisine_priority:
    - Maharashtrian
    - Pan Indian
    - North Indian
    - South Indian
    - Gujarati
  user_region_weight: 0.90      # boost for user's own cuisine
  pan_indian_weight:  0.10      # residual weight for Pan Indian
  cuisine_priority_weight: 0.90

# ── Regional Distribution (Part 9) ───────────────────────────────────────────
# Controls what fraction of weekly meals come from each cuisine tier.
# Tier 1 = user's home cuisine; Tier 2 = Pan Indian; Tier 3 = other.
regional_distribution:
  home_cuisine_fraction: 0.70   # ~70% of meals from home cuisine
  pan_indian_fraction:   0.20   # ~20% from Pan Indian
  other_fraction:        0.10   # ~10% from any other cuisine

