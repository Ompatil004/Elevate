    carb_base: 1.2
    veg_side: 1.1
    salad: 0.9
    dairy_side: 0.9
  curry:
    carb_base: 1.3
    veg_side: 0.8
    salad: 0.9
    dairy_side: 0.9
  carb_base:
    protein_main: 1.2
    curry: 1.3
    veg_side: 1.1
    dairy_side: 0.9
  dairy_side:
    salad: 0.4
    dairy_side: 0.0
    protein_main: 0.9
    carb_base: 0.9
    veg_side: 0.8
  salad:
    salad: 0.0
    dairy_side: 0.4
    protein_main: 0.9
    curry: 0.9
    carb_base: 0.8

